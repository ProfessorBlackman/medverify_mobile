<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Instant Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl">
<!-- TopAppBar -->
<header class="flex items-center bg-transparent p-4 justify-end shrink-0">
<button class="text-[#61896f] dark:text-gray-400 text-base font-semibold leading-normal tracking-wide hover:opacity-80 transition-opacity">
                Skip
            </button>
</header>
<!-- Main Content Scroll Area -->
<main class="flex-1 flex flex-col items-center justify-center px-6 overflow-y-auto">
<!-- HeaderImage / Illustration -->
<div class="w-full max-w-[320px] aspect-square relative flex items-center justify-center mb-8">
<!-- Illustration Placeholder Container -->
<div class="w-full h-full bg-gradient-to-br from-primary/10 to-primary/5 rounded-3xl flex items-center justify-center relative overflow-hidden" data-alt="Smartphone scanning medicine box with green focus">
<!-- Stylized Phone Mockup -->
<div class="w-32 h-64 bg-slate-800 rounded-[2rem] border-4 border-slate-700 relative z-10 shadow-2xl flex flex-col items-center p-2">
<div class="w-12 h-1 bg-slate-700 rounded-full mb-2"></div>
<div class="w-full h-full bg-slate-900 rounded-[1.5rem] overflow-hidden relative border border-slate-700">
<!-- Focus Square -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-20 h-20 border-2 border-primary rounded-lg relative">
<div class="absolute -top-1 -left-1 w-3 h-3 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -top-1 -right-1 w-3 h-3 border-t-2 border-r-2 border-primary"></div>
<div class="absolute -bottom-1 -left-1 w-3 h-3 border-b-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-1 -right-1 w-3 h-3 border-b-2 border-r-2 border-primary"></div>
<div class="w-full h-0.5 bg-primary/40 animate-pulse mt-10"></div>
</div>
</div>
</div>
</div>
<!-- Stylized Medicine Box Background -->
<div class="absolute bottom-12 right-6 w-32 h-20 bg-white border border-gray-200 rounded-md shadow-md rotate-12 flex flex-col p-2">
<div class="w-full h-2 bg-red-500 rounded-sm mb-1"></div>
<div class="w-1/2 h-1.5 bg-gray-200 rounded-sm mb-1"></div>
<div class="w-1/3 h-1.5 bg-gray-200 rounded-sm mt-auto"></div>
<div class="absolute right-2 bottom-2 w-6 h-6 bg-slate-200 rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-slate-400">qr_code_2</span>
</div>
</div>
<!-- Ghana Flag Colors Detail -->
<div class="absolute top-8 left-8 flex space-x-1 opacity-40">
<div class="w-2 h-2 rounded-full bg-red-600"></div>
<div class="w-2 h-2 rounded-full bg-yellow-400"></div>
<div class="w-2 h-2 rounded-full bg-green-600"></div>
</div>
</div>
</div>
<!-- HeadlineText -->
<h1 class="text-[#111813] dark:text-white text-3xl font-bold leading-tight text-center mb-4">
                Instant Verification
            </h1>
<!-- BodyText -->
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center px-2 max-w-sm">
                Quickly scan any drug barcode or QR code to check its registration status with the Ghana FDA.
            </p>
</main>
<!-- Bottom Controls -->
<footer class="flex flex-col items-center p-8 pt-4 space-y-6">
<!-- PageIndicators -->
<div class="flex w-full flex-row items-center justify-center gap-2">
<div class="h-2 w-6 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-gray-200 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-gray-200 dark:bg-slate-700"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-opacity-90 text-black text-lg font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
</div>
</body></html>
