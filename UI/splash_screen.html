<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedVerify Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecc8",
                        "background-light": "#ffffff", // Pure white for sterile/clean look
                        "background-dark": "#10221f",
                        "secondary-text": "#618983",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden selection:bg-primary selection:text-white">
<!-- Splash Screen Container -->
<div class="relative flex h-screen w-full flex-col justify-between items-center p-6 bg-background-light dark:bg-background-dark transition-colors duration-300">
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-48 h-48 bg-primary/10 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
<!-- Top Spacer for Visual Balance -->
<div class="flex-1"></div>
<!-- Central Content Area -->
<div class="flex flex-col items-center justify-center w-full max-w-sm z-10">
<!-- Logo Section -->
<div class="relative mb-8">
<div class="w-32 h-32 bg-primary/10 rounded-3xl flex items-center justify-center relative overflow-hidden ring-1 ring-primary/20 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1, 'wght' 600;">
                        verified_user
                    </span>
<!-- Scan line effect -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-primary/20 to-transparent h-1/2 w-full animate-[scan_2s_ease-in-out_infinite] translate-y-[-100%]"></div>
</div>
</div>
<!-- Typography Section -->
<div class="text-center space-y-2 mb-12">
<h1 class="text-slate-900 dark:text-white tracking-tight text-4xl font-extrabold leading-tight">
                    MedVerify
                </h1>
<p class="text-slate-500 dark:text-gray-400 text-lg font-normal leading-relaxed">
                    Verify Safety. Trust Your Meds.
                </p>
</div>
</div>
<!-- Bottom Section: Loader & Footer -->
<div class="flex-1 flex flex-col justify-end items-center w-full max-w-xs pb-8 z-10">
<!-- Loading State -->
<div class="w-full flex flex-col gap-3 mb-10">
<div class="flex justify-between items-end px-1">
<span class="text-slate-600 dark:text-gray-300 text-sm font-medium">Initializing secure database...</span>
<span class="text-primary text-xs font-bold">84%</span>
</div>
<!-- Custom Progress Bar -->
<div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full relative w-[84%] shadow-[0_0_10px_rgba(19,236,200,0.5)]">
<div class="absolute inset-0 bg-white/30 w-full h-full animate-pulse"></div>
</div>
</div>
</div>
<!-- Footer Meta -->
<div class="flex flex-col items-center gap-1 opacity-80">
<p class="text-secondary-text dark:text-gray-500 text-xs font-medium text-center flex items-center gap-1">
<span class="material-symbols-outlined text-sm">security</span>
                    Powered by FDA Ghana Data
                </p>
<p class="text-slate-400 dark:text-gray-600 text-[10px] mt-2">v2.4.0 (Build 2024)</p>
</div>
</div>
</div>
<!-- Animation CSS for scan line -->
<style>
        @keyframes scan {
            0% { transform: translateY(-150%); }
            50% { transform: translateY(150%); }
            100% { transform: translateY(-150%); }
        }
    </style>
</body></html>
